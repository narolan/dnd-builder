<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#c9a440"/>
<meta name="description" content="Build and manage D&D 5e characters step-by-step"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Character Forge"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-192.svg"/>
<title th:text="'Character Forge — Step ' + ${step} + ' of ' + ${totalSteps}">Character Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/wizard.css"/>
</head>
<body>

<header>
  <div class="site-title">Character Forge</div>
  <div class="site-sub">D&amp;D 5e 2014 · Step-by-Step Builder</div>
</header>

<!-- ── Progress bar ──────────────────────────────────────────────────────── -->
<div class="progress-wrap">
  <div class="step-labels">
    <th:block th:each="i : ${#numbers.sequence(1,totalSteps)}">
      <div class="step-label"
           th:classappend="${i == step} ? 'active' : (${i < step} ? 'done' : '')"
           th:text="${i == 1 ? 'Race' : i == 2 ? 'Class' : i == 3 ? 'Background' :
                    i == 4 ? 'Scores' : i == 5 ? 'Skills' : i == 6 ? 'Feats' :
                    i == 7 ? 'Spells' : i == 8 ? 'Equipment' : 'Review'}">
      </div>
    </th:block>
  </div>
  <div class="progress-track">
    <div class="progress-fill" th:style="'width:' + (${step} * 100 / ${totalSteps}) + '%'"></div>
  </div>
  <div class="step-dots">
    <th:block th:each="i : ${#numbers.sequence(1,totalSteps)}">
      <a th:href="'/step/' + ${i}" th:if="${i <= draft.highestStepReached}"
         class="step-dot" th:classappend="${i == step} ? 'active' : 'done'"></a>
      <div th:unless="${i <= draft.highestStepReached}" class="step-dot"></div>
    </th:block>
  </div>
</div>

<!-- ── Nav shortcut strip ─────────────────────────────────────────────────── -->
<div class="nav-strip">
  <th:block th:each="i : ${#numbers.sequence(1,totalSteps)}">
    <a th:if="${i <= draft.highestStepReached}" th:href="'/step/' + ${i}"
       class="nav-link" th:classappend="${i == step} ? 'active' : ''"
       th:text="${i == 1 ? 'Race' : i == 2 ? 'Class' : i == 3 ? 'Background' :
                i == 4 ? 'Scores' : i == 5 ? 'Skills' : i == 6 ? 'Feats' :
                i == 7 ? 'Spells' : i == 8 ? 'Equipment' : 'Review'}">
    </a>
  </th:block>
  <form method="post" action="/new" style="display:inline">
    <button type="submit" class="nav-link" style="background:none;cursor:pointer;border-color:var(--red);">↺ New</button>
  </form>
</div>

<div class="forge-panel">

<!-- ── Alerts ────────────────────────────────────────────────────────────── -->
<div th:if="${error != null and !#strings.isEmpty(error)}" class="alert alert-error" th:text="${error}"></div>
<div th:if="${importError != null}" class="alert alert-error" th:text="${importError}"></div>
<div th:if="${importSuccess != null}" class="alert alert-success" th:text="${importSuccess}"></div>

<!-- ── Step content ───────────────────────────────────────────────────────── -->
<th:block th:if="${step == 1}"><th:block th:replace="~{steps/step1 :: content}"></th:block></th:block>
<th:block th:if="${step == 2}"><th:block th:replace="~{steps/step2 :: content}"></th:block></th:block>
<th:block th:if="${step == 3}"><th:block th:replace="~{steps/step3 :: content}"></th:block></th:block>
<th:block th:if="${step == 4}"><th:block th:replace="~{steps/step4 :: content}"></th:block></th:block>
<th:block th:if="${step == 5}"><th:block th:replace="~{steps/step5 :: content}"></th:block></th:block>
<th:block th:if="${step == 6}"><th:block th:replace="~{steps/step6 :: content}"></th:block></th:block>
<th:block th:if="${step == 7}"><th:block th:replace="~{steps/step7 :: content}"></th:block></th:block>
<th:block th:if="${step == 8}"><th:block th:replace="~{steps/step8 :: content}"></th:block></th:block>
<th:block th:if="${step == 9}"><th:block th:replace="~{steps/step9 :: content}"></th:block></th:block>

</div><!-- /forge-panel -->

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- JAVASCRIPT                                                                 -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<script th:inline="javascript">
/*<![CDATA[*/

// ─── Race step (step 1) ────────────────────────────────────────────────────
const RACES_DATA = /*[[${racesJson}]]*/ '[]';
const RACES = typeof RACES_DATA === 'string' ? JSON.parse(RACES_DATA) : (RACES_DATA || []);
const RACES_MAP = {};
RACES.forEach(r => RACES_MAP[r.id] = r);

const STAT_NAMES = ['STR','DEX','CON','INT','WIS','CHA'];

function raceChanged(raceId) {
    const race  = RACES_MAP[raceId];
    const tagsEl = document.getElementById('asi-tags');
    const flexEl = document.getElementById('flex-section');
    if (!tagsEl) return;
    if (!race) { tagsEl.innerHTML = ''; flexEl && (flexEl.innerHTML = ''); return; }

    let html = '';
    if (race.fixedBonuses) {
        Object.entries(race.fixedBonuses).forEach(([s,v]) => {
            const cls = v < 0 ? 'asi-tag neg' : 'asi-tag';
            html += `<span class="${cls}">${s} ${v>0?'+':''}${v}</span>`;
        });
    }
    if (race.flexibleBonuses) {
        race.flexibleBonuses.forEach(fb => {
            for (let i = 0; i < fb.count; i++) {
                html += `<span class="asi-tag flex">? +${fb.amount}</span>`;
            }
        });
    }
    tagsEl.innerHTML = html;
    if (flexEl) buildFlexSelects(race, flexEl);
}

function buildFlexSelects(race, container) {
    if (!race.flexibleBonuses || race.flexibleBonuses.length === 0) {
        container.innerHTML = ''; return;
    }
    let html = '<div class="flex-section"><div class="flex-title">Choose Your Flexible Bonuses</div>';
    race.flexibleBonuses.forEach((fb, idx) => {
        for (let i = 0; i < fb.count; i++) {
            const key = `flex_${idx}_${i}`;
            const curVal = document.querySelector(`input[name="${key}"]`)?.value || '';
            html += `<div class="flex-row">
              <label>+${fb.amount} to:</label>
              <select name="${key}" onchange="validateFlex()">
                <option value="">— choose —</option>
                ${STAT_NAMES.filter(s => !fb.excludedStats || !fb.excludedStats.includes(s))
                    .map(s => `<option value="${s}" ${s===curVal?'selected':''}>${s}</option>`).join('')}
              </select></div>`;
        }
    });
    html += '</div>';
    container.innerHTML = html;
}

function validateFlex() { /* live validation could go here */ }

(function() {
    const checked = document.querySelector('input[name="raceId"]:checked');
    if (checked) raceChanged(checked.value);
})();

// ─── Background step (step 3) ────────────────────────────────────────────
const BGS_RAW = /*[[${backgroundsJson}]]*/ '[]';
const BGS = typeof BGS_RAW === 'string' ? JSON.parse(BGS_RAW) : (BGS_RAW || []);
const BGS_MAP = {};
BGS.forEach(b => BGS_MAP[b.id] = b);

function bgChanged(bgId) {
    const box   = document.getElementById('bg-info');
    const inner = document.getElementById('bg-info-inner');
    if (!box || !inner) return;
    const bg = BGS_MAP[bgId];
    if (!bg) { box.style.display = 'none'; return; }

    const langs = bg.bonusLanguages > 0
        ? `${bg.bonusLanguages} additional language${bg.bonusLanguages > 1 ? 's' : ''}`
        : 'none';
    const tools = bg.toolProficiencies && bg.toolProficiencies.length > 0
        ? bg.toolProficiencies.join(', ')
        : '';

    inner.innerHTML = `
        <span class="feature-name">${bg.featureName}</span>
        <span>${bg.featureDesc}</span>
        <div style="margin-top:8px;font-size:.8rem;color:var(--cream-dim)">
            Starting gold: <strong>${bg.gold} gp</strong>
            &nbsp;·&nbsp; Languages: <strong>${langs}</strong>
            ${tools ? `&nbsp;·&nbsp; Tools: <strong>${tools}</strong>` : ''}
        </div>`;
    box.style.display = 'block';
}

(function() {
    const seed = document.getElementById('bg-seed');
    if (!seed) return;
    const bgId = seed.dataset.bgid;
    if (bgId) bgChanged(bgId);
})();

// ─── Class step (step 2) ──────────────────────────────────────────────────
const CLASSES_RAW = /*[[${classesJson}]]*/ '[]';
const CLASSES = typeof CLASSES_RAW === 'string' ? JSON.parse(CLASSES_RAW) : (CLASSES_RAW || []);
const CLASSES_MAP = {};
CLASSES.forEach(c => CLASSES_MAP[c.id] = c);

function classChanged(classId) {
    const area      = document.getElementById('subclass-area');
    const head      = document.getElementById('subclass-head');
    const grid      = document.getElementById('subclass-grid');
    if (!area) return;

    const cls = CLASSES_MAP[classId];
    if (!cls || !cls.subclasses || cls.subclasses.length === 0) {
        area.style.display = 'none';
        return;
    }

    const seed         = document.getElementById('subclass-seed');
    const prevSubclass = seed ? seed.dataset.subclassid : '';

    head.textContent = 'Subclass — ' + (cls.subclassNote || 'Choose subclass');

    grid.innerHTML = cls.subclasses.map(sub => `
        <div class="subclass-opt">
          <input type="radio" name="subclassId" value="${sub.id}" id="sub_${sub.id}"
                 ${sub.id === prevSubclass ? 'checked' : ''}/>
          <label for="sub_${sub.id}">
            <span class="subclass-name">${sub.name}</span>
            <span class="subclass-desc">${sub.description}</span>
          </label>
        </div>`).join('');

    area.style.display = 'block';
}

(function() {
    const seed = document.getElementById('subclass-seed');
    if (!seed) return;
    const classId = seed.dataset.classid;
    if (classId) classChanged(classId);
    const radio = document.querySelector(`input[name="characterClass"][value="${classId}"]`);
    if (radio) radio.checked = true;
})();

// ─── Point buy (step 4) ───────────────────────────────────────────────────
const POINT_BUDGET  = /*[[${pointBudget}]]*/ 27;
const SCORE_MIN     = /*[[${scoreMin}]]*/ 8;
const SCORE_MAX     = /*[[${scoreMax}]]*/ 15;
const POINT_COSTS   = {8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};

const RACIAL_BONUSES = {};
(function(){
    const raceId = /*[[${draft.raceId}]]*/ '';
    const race   = RACES_MAP[raceId];
    if (!race) return;
    const flexPicks = /*[[${draft.flexPicks}]]*/ {};
    STAT_NAMES.forEach(s => {
        let b = (race.fixedBonuses && race.fixedBonuses[s]) || 0;
        if (race.flexibleBonuses) {
            race.flexibleBonuses.forEach((fb,idx) => {
                for (let i=0; i < fb.count; i++) {
                    const k = `flex_${idx}_${i}`;
                    if (flexPicks[k] === s) b += fb.amount;
                }
            });
        }
        RACIAL_BONUSES[s] = b;
    });
})();

const scores = {};
STAT_NAMES.forEach(s => {
    const inp = document.getElementById('sinput_' + s);
    scores[s] = inp ? parseInt(inp.value) || 8 : 8;
});

function getCost(v) { return POINT_COSTS[v] ?? 0; }
function spent()    { return STAT_NAMES.reduce((a,s) => a + getCost(scores[s]), 0); }
function remaining(){ return POINT_BUDGET - spent(); }
function mod(v)     { return Math.floor((v - 10) / 2); }
function fmtMod(m)  { return (m>=0?'+':'')+m; }

function adj(stat, delta) {
    const cur  = scores[stat];
    const next = cur + delta;
    if (next < SCORE_MIN || next > SCORE_MAX) return;
    const newCost = getCost(next) - getCost(cur);
    if (newCost > 0 && remaining() < newCost) return;
    scores[stat] = next;
    refreshScores();
}

function refreshScores() {
    if (!document.getElementById('pts-remaining')) return;
    const rem = remaining();
    const pct = Math.max(0, Math.min(100, (rem / POINT_BUDGET) * 100));

    const numEl = document.getElementById('pts-remaining');
    const bar   = document.getElementById('budget-bar-fill');
    const msg   = document.getElementById('pts-validation');
    numEl.textContent = rem;
    numEl.className   = 'budget-num' + (rem < 0 ? ' danger' : rem <= 5 ? ' warn' : '');
    bar.style.width   = pct + '%';
    bar.style.background = rem < 0
        ? 'linear-gradient(90deg,#6b1010,var(--red))'
        : rem <= 5 ? 'linear-gradient(90deg,#7a4010,#c87020)'
        : 'linear-gradient(90deg,var(--gold-dim),var(--gold))';
    msg.textContent = rem < 0 ? '⚠ Over budget by ' + Math.abs(rem) + ' pt' + (Math.abs(rem)>1?'s':'') : '';

    STAT_NAMES.forEach(stat => {
        const base   = scores[stat];
        const racial = RACIAL_BONUSES[stat] || 0;
        const final  = base + racial;
        const cost   = getCost(base);
        const m      = mod(final);

        const finalEl = document.getElementById('sfinal_'+stat);
        if (finalEl) finalEl.textContent = final;
        const baseEl = document.getElementById('sbase_disp_'+stat);
        if (baseEl) baseEl.textContent = base;
        const racialEl = document.getElementById('sracial_'+stat);
        if (racialEl) {
            if (racial !== 0) {
                racialEl.textContent = ' + ' + (racial>0?'+':'') + racial;
                racialEl.className   = 'stat-racial' + (racial<0?' neg':'');
                racialEl.style.display = '';
            } else { racialEl.style.display = 'none'; }
        }
        const costEl = document.getElementById('scost_'+stat);
        if (costEl) costEl.textContent = cost + (cost===1?' pt':' pts');
        const stepEl = document.getElementById('sstep_'+stat);
        if (stepEl) stepEl.textContent = base;
        const modEl  = document.getElementById('smod_'+stat);
        if (modEl) {
            modEl.textContent = fmtMod(m);
            modEl.className   = 'mod-badge' + (m<0?' neg':'');
        }
        const inp = document.getElementById('sinput_'+stat);
        if (inp) inp.value = base;

        const card = document.getElementById('scard_'+stat);
        if (card) {
            const btns = card.querySelectorAll('.stepper button');
            if (btns[0]) btns[0].disabled = base <= SCORE_MIN;
            if (btns[1]) {
                const nextCost = base < SCORE_MAX ? getCost(base + 1) - getCost(base) : 0;
                btns[1].disabled = base >= SCORE_MAX || remaining() < nextCost;
            }
        }
    });
}

refreshScores();

// ─── Skill counter (step 5) ────────────────────────────────────────────────
const MAX_CLASS_SKILLS = /*[[${classChoiceCount}]]*/ 2;

function countSkills() {
    const cbs    = document.querySelectorAll('input[name="skills"]');
    const count  = Array.from(cbs).filter(c => c.checked).length;
    const el     = document.getElementById('skill-chosen-count');
    if (el) el.textContent = count;
    cbs.forEach(cb => {
        if (!cb.checked && count >= MAX_CLASS_SKILLS) cb.disabled = true;
        else cb.disabled = false;
    });
}
countSkills();

// ─── Spell counters (step 7) ───────────────────────────────────────────────
function countSpells(cbClass, countId) {
    const cbs   = document.querySelectorAll('.' + cbClass);
    const count = Array.from(cbs).filter(c => c.checked).length;
    const maxEl = cbs[0];
    const max   = maxEl ? parseInt(maxEl.dataset.max) || 99 : 99;
    const el    = document.getElementById(countId);
    if (el) el.textContent = count;
    cbs.forEach(cb => {
        if (!cb.checked && count >= max) cb.disabled = true;
        else cb.disabled = false;
    });
}
if (document.querySelector('.cantrip-cb'))  countSpells('cantrip-cb','cantrip-count');
if (document.querySelector('.spell1-cb'))   countSpells('spell1-cb','spell-count');
if (document.querySelector('.spellbook-cb'))countSpells('spellbook-cb','spellbook-count');

// ═══════════════════════════════════════════════════════════════════════════════
// PREMIUM MICRO-INTERACTIONS
// ═══════════════════════════════════════════════════════════════════════════════

// ─── Toast Notification System ─────────────────────────────────────────────────
const Toast = {
    container: null,
    init() {
        if (this.container) return;
        this.container = document.createElement('div');
        this.container.id = 'toast-container';
        this.container.style.cssText = `
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        `;
        document.body.appendChild(this.container);
    },
    show(message, type = 'info', duration = 3000) {
        this.init();
        const toast = document.createElement('div');
        toast.style.cssText = `
            padding: 12px 20px; border-radius: 4px; font-family: 'Cinzel', serif;
            font-size: .75rem; letter-spacing: .1em; pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,.5); transform: translateX(120%);
            transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .3s ease;
            border: 1px solid; backdrop-filter: blur(10px);
        `;
        const colors = {
            success: { bg: 'rgba(42,92,42,.9)', border: '#4a9c4a', color: '#7fcc7f' },
            error:   { bg: 'rgba(139,32,32,.9)', border: '#c43030', color: '#ff8080' },
            info:    { bg: 'rgba(37,29,14,.95)', border: '#c9a440', color: '#e8c870' }
        };
        const c = colors[type] || colors.info;
        toast.style.background = c.bg;
        toast.style.borderColor = c.border;
        toast.style.color = c.color;
        toast.textContent = message;
        this.container.appendChild(toast);
        requestAnimationFrame(() => toast.style.transform = 'translateX(0)');
        setTimeout(() => {
            toast.style.transform = 'translateX(120%)';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    },
    success(msg) { this.show(msg, 'success'); },
    error(msg)   { this.show(msg, 'error'); },
    info(msg)    { this.show(msg, 'info'); }
};

// ─── Animated Number Counter ───────────────────────────────────────────────────
function animateValue(el, start, end, duration = 300) {
    if (!el || start === end) return;
    const range = end - start;
    const startTime = performance.now();
    const easeOut = t => 1 - Math.pow(1 - t, 3);

    function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const value = Math.round(start + range * easeOut(progress));
        el.textContent = value;
        if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
}

// Enhanced budget update with animation
const origRefreshScores = typeof refreshScores === 'function' ? refreshScores : null;
if (origRefreshScores) {
    let lastRemaining = remaining();
    window.refreshScores = function() {
        const prevRem = lastRemaining;
        origRefreshScores();
        const newRem = remaining();
        if (prevRem !== newRem) {
            const numEl = document.getElementById('pts-remaining');
            if (numEl) animateValue(numEl, prevRem, newRem, 250);
        }
        lastRemaining = newRem;
    };
}

// ─── Smooth Scroll to Errors ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    const alert = document.querySelector('.alert-error');
    if (alert) {
        alert.scrollIntoView({ behavior: 'smooth', block: 'center' });
        alert.style.animation = 'none';
        requestAnimationFrame(() => {
            alert.style.animation = 'slideInLeft .4s ease-out, borderGlow 1s ease-in-out 3';
        });
    }
});

// ─── Card Selection Feedback ───────────────────────────────────────────────────
document.querySelectorAll('.card-option input, .spell-card input, .feat-card input').forEach(input => {
    input.addEventListener('change', function() {
        if (this.checked) {
            const label = this.nextElementSibling;
            if (label) {
                label.style.transform = 'scale(.95)';
                setTimeout(() => label.style.transform = '', 150);
            }
        }
    });
});

// ─── Keyboard Navigation Enhancement ───────────────────────────────────────────
document.addEventListener('keydown', (e) => {
    // Arrow key navigation for card grids
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
        const focused = document.activeElement;
        const grid = focused?.closest('.card-grid, .stat-grid, .spell-grid');
        if (!grid) return;

        const items = [...grid.querySelectorAll('input[type="radio"], input[type="checkbox"], button')];
        const idx = items.indexOf(focused);
        if (idx === -1) return;

        let nextIdx = idx;
        const cols = Math.floor(grid.offsetWidth / (items[0]?.closest('div')?.offsetWidth || 200)) || 3;

        switch (e.key) {
            case 'ArrowRight': nextIdx = Math.min(idx + 1, items.length - 1); break;
            case 'ArrowLeft':  nextIdx = Math.max(idx - 1, 0); break;
            case 'ArrowDown':  nextIdx = Math.min(idx + cols, items.length - 1); break;
            case 'ArrowUp':    nextIdx = Math.max(idx - cols, 0); break;
        }

        if (nextIdx !== idx) {
            e.preventDefault();
            items[nextIdx].focus();
        }
    }

    // Quick submit with Ctrl+Enter
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        const form = document.querySelector('form');
        const submitBtn = form?.querySelector('.btn-next, button[type="submit"]');
        if (submitBtn && !submitBtn.disabled) {
            e.preventDefault();
            submitBtn.click();
            Toast.info('Advancing to next step...');
        }
    }
});

// ─── Form Submit Feedback ──────────────────────────────────────────────────────
document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function(e) {
        const btn = this.querySelector('.btn-next, button[type="submit"]');
        if (btn) {
            btn.style.pointerEvents = 'none';
            btn.innerHTML = '<span style="display:inline-block;animation:pulse 1s infinite">◆</span> Saving...';
        }
    });
});

// ─── Stepper Button Ripple Effect ──────────────────────────────────────────────
document.querySelectorAll('.stepper button').forEach(btn => {
    btn.addEventListener('click', function(e) {
        if (this.disabled) return;
        const ripple = document.createElement('span');
        ripple.style.cssText = `
            position: absolute; border-radius: 50%; background: rgba(201,164,64,.4);
            width: 50px; height: 50px; transform: translate(-50%, -50%) scale(0);
            animation: ripple .4s ease-out; pointer-events: none;
        `;
        const rect = this.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top = (e.clientY - rect.top) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 400);
    });
});

// Add ripple animation style
const rippleStyle = document.createElement('style');
rippleStyle.textContent = `
    @keyframes ripple {
        to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
`;
document.head.appendChild(rippleStyle);

// ─── Spell Tooltip System ──────────────────────────────────────────────────────
const SpellTooltip = {
    tooltip: null,
    init() {
        if (this.tooltip) return;
        this.tooltip = document.createElement('div');
        this.tooltip.id = 'spell-tooltip';
        this.tooltip.style.cssText = `
            position: fixed; z-index: 10000; max-width: 380px; padding: 16px;
            background: linear-gradient(135deg, #1a1408 0%, #251d0e 100%);
            border: 2px solid var(--gold); border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,.8), inset 0 1px 0 rgba(201,164,64,.2);
            font-family: 'Crimson Text', serif; font-size: .95rem; color: var(--cream);
            opacity: 0; pointer-events: none; transition: opacity .2s ease;
            backdrop-filter: blur(10px);
        `;
        document.body.appendChild(this.tooltip);
    },
    show(el, e) {
        this.init();
        const name = el.dataset.spellName || 'Unknown';
        const level = el.dataset.spellLevel;
        const school = el.dataset.spellSchool || '';
        const time = el.dataset.spellTime || '';
        const range = el.dataset.spellRange || '';
        const duration = el.dataset.spellDuration || '';
        const components = el.dataset.spellComponents || '';
        const conc = el.dataset.spellConc === 'true';
        const ritual = el.dataset.spellRitual === 'true';
        const desc = el.dataset.spellDesc || 'No description available.';

        const levelText = level === '0' ? 'Cantrip' : `Level ${level}`;
        const tags = [];
        if (conc) tags.push('<span class="tt-tag conc">Concentration</span>');
        if (ritual) tags.push('<span class="tt-tag ritual">Ritual</span>');

        this.tooltip.innerHTML = `
            <div class="tt-header">
                <span class="tt-name">${name}</span>
                <span class="tt-level">${levelText}</span>
            </div>
            <div class="tt-school">${school}</div>
            ${tags.length ? '<div class="tt-tags">' + tags.join('') + '</div>' : ''}
            <div class="tt-stats">
                <div><strong>Casting Time:</strong> ${time}</div>
                <div><strong>Range:</strong> ${range}</div>
                <div><strong>Duration:</strong> ${duration}</div>
                <div><strong>Components:</strong> ${components}</div>
            </div>
            <div class="tt-desc">${desc}</div>
        `;

        // Position tooltip
        const rect = el.getBoundingClientRect();
        const ttRect = this.tooltip.getBoundingClientRect();
        let left = rect.left + rect.width / 2 - 190;
        let top = rect.bottom + 10;

        // Keep on screen
        if (left < 10) left = 10;
        if (left + 380 > window.innerWidth) left = window.innerWidth - 390;
        if (top + 300 > window.innerHeight) top = rect.top - 310;

        this.tooltip.style.left = left + 'px';
        this.tooltip.style.top = top + 'px';
        this.tooltip.style.opacity = '1';
    },
    hide() {
        if (this.tooltip) this.tooltip.style.opacity = '0';
    }
};

// Attach tooltip events to spell chips
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.spell-chip').forEach(chip => {
        chip.addEventListener('mouseenter', (e) => SpellTooltip.show(chip, e));
        chip.addEventListener('mouseleave', () => SpellTooltip.hide());
        chip.addEventListener('click', (e) => {
            e.preventDefault();
            SpellTooltip.show(chip, e);
            setTimeout(() => SpellTooltip.hide(), 5000);
        });
    });
});

}
